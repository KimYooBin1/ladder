<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고정 결과 사다리타기</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">사다리타기</p>
      <h1>1번은 항상 1번으로 연결되는 사다리</h1>
      <p class="desc">사다리는 매번 랜덤으로 생성되고 1번도 연결될 수 있지만, 결과는 항상 1번으로 돌아오게 만듭니다.</p>
    </header>

    <section class="controls">
      <label for="playerCount">인원 수</label>
      <input id="playerCount" type="number" min="3" max="10" value="6">
      <button id="regenBtn" type="button">사다리 다시 만들기</button>
      <button id="resetBtn" type="button">결과 지우기</button>
    </section>

    <section class="board-wrap">
      <div id="topLabels" class="labels top"></div>
      <canvas id="ladderCanvas" width="900" height="560" aria-label="사다리"></canvas>
      <div id="bottomLabels" class="labels bottom"></div>
    </section>

    <section class="pick">
      <p>번호 선택</p>
      <div id="pickButtons" class="pick-buttons"></div>
    </section>

    <section id="result" class="result" aria-live="polite">
      번호를 선택하세요.
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
